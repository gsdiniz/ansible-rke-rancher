- name: Install RKE2 binaries
  ansible.builtin.shell:
    cmd: curl -sfL https://get.rke2.io | sh -
    creates: /usr/bin/rke2

- name: Install RKE2-SELINUX
  become: true
  ansible.builtin.dnf:
    name:
    - rke2-selinux
    state: present
  notify: Reboot node

- name: Reboot after RKE2 SELinux policy installation if needed
  ansible.builtin.meta: flush_handlers

- name: Check if kubectl is installed
  ansible.builtin.stat:
    path: /usr/local/bin/kubectl
  register: kubectl_bin

- name: Download Kubectl Installer
  ansible.builtin.shell:
    cmd: 'curl -L -o /tmp/kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"'
    creates: /tmp/kubectl
  when: not kubectl_bin.stat.exists

- name: Install Kubectl
  ansible.builtin.command: install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
  args:
    creates: /usr/local/bin/kubectl

- name: Install git
  ansible.builtin.yum:
    name: git
    state: present

- name: Check if Helm is installed
  ansible.builtin.command: /usr/local/bin/helm version
  register: helm_check
  failed_when: false
  changed_when: false

- name: Install Helm
  ansible.builtin.shell: 'curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 && chmod 700 /tmp/get_helm.sh && /tmp/get_helm.sh'
  args:
    creates: /usr/local/bin/helm
  environment:
    PATH: /usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  when: helm_check.rc != 0

- name: Verify Helm installation
  ansible.builtin.command: /usr/local/bin/helm version
  changed_when: false

- name: Add rancher repo to helm
  kubernetes.core.helm_repository:
    name: rancher-stable
    binary_path: /usr/local/bin/helm
    repo_url: https://releases.rancher.com/server-charts/stable
    state: present

- name: Add jetstack repo to helm
  kubernetes.core.helm_repository:
    name: jetstack
    binary_path: /usr/local/bin/helm
    repo_url: https://charts.jetstack.io
    state: present

- name: Update Helm
  ansible.builtin.command: /usr/local/bin/helm repo update
  changed_when: false

- name: Create cluster config dir
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'

- name: Create RKE2 manifests dir
  ansible.builtin.file:
    path: /var/lib/rancher/rke2/server/manifests
    state: directory
    mode: '0755'
  when: >
    (rke2_cni | default('calico')) == 'cilium' or
    (rke2_ingress_nginx_load_balancer_enabled | default(false) | bool)

- name: Configure packaged Cilium chart
  ansible.builtin.template:
    src: rke2-cilium-config.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/rke2-cilium-config.yaml
    mode: '0644'
  when: rke2_cni | default('calico') == 'cilium'
  notify: Restart rke2-server

- name: Configure Cilium BGP resources
  ansible.builtin.template:
    src: cilium-bgp.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/cilium-bgp.yaml
    mode: '0644'
  when:
    - rke2_cni | default('calico') == 'cilium'
    - rke2_cilium_bgp_enabled | default(false) | bool
  notify: Restart rke2-server

- name: Configure Cilium L2 announcement resources
  ansible.builtin.template:
    src: cilium-l2.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/cilium-l2.yaml
    mode: '0644'
  when:
    - rke2_cni | default('calico') == 'cilium'
    - rke2_cilium_l2_enabled | default(false) | bool
  notify: Restart rke2-server

- name: Configure packaged ingress-nginx LoadBalancer service
  ansible.builtin.template:
    src: rke2-ingress-nginx-config.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/rke2-ingress-nginx-config.yaml
    mode: '0644'
  when: rke2_ingress_nginx_load_balancer_enabled | default(false) | bool

- name: Set initial server config
  ansible.builtin.template:
    src: rke2-principal-config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'
  notify: Restart rke2-server

- name: Restart RKE2 server after config change if needed
  ansible.builtin.meta: flush_handlers

- name: Start server instance
  ansible.builtin.service:
    name: rke2-server
    state: started
    enabled: true

- name: Remove control-plane-only taint in single-node clusters
  ansible.builtin.command: >-
    /usr/local/bin/kubectl --kubeconfig /etc/rancher/rke2/kubeconfig.yaml
    taint node {{ hostname }} CriticalAddonsOnly=true:NoExecute-
  register: remove_single_node_taint
  failed_when:
    - remove_single_node_taint.rc != 0
    - "'not found' not in remove_single_node_taint.stderr"
    - "'not found' not in remove_single_node_taint.stdout"
  changed_when: remove_single_node_taint.rc == 0
  when:
    - (rke2_schedule_workloads_on_servers | default((groups.get('masters', []) | length == 1) and (groups.get('workers', []) | length == 0))) | bool

- name: Label single-node server as worker
  ansible.builtin.command: >-
    /usr/local/bin/kubectl --kubeconfig /etc/rancher/rke2/kubeconfig.yaml
    label node {{ hostname }} node-role.kubernetes.io/worker=true --overwrite
  register: label_single_node_worker
  changed_when: "'not labeled' not in label_single_node_worker.stdout"
  when:
    - (rke2_schedule_workloads_on_servers | default((groups.get('masters', []) | length == 1) and (groups.get('workers', []) | length == 0))) | bool

- name: Create kubeconfig dir
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: '0700'

- name: Create kubeconfig file
  ansible.builtin.file:
    src: /etc/rancher/rke2/kubeconfig.yaml
    dest: /root/.kube/config
    state: link

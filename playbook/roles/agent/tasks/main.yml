- name: Install RKE2 binaries
  become: true
  ansible.builtin.shell:
    cmd: curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE="agent" sh -
    creates: /usr/local/bin/rke2

- name: Install RKE2-SELINUX
  become: true
  ansible.builtin.dnf:
    name:
    - rke2-selinux
    state: present
  notify: Reboot node

- name: Reboot after RKE2 SELinux policy installation if needed
  ansible.builtin.meta: flush_handlers
    
- name: Create cluster config dir
  become: true
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'

- name: Set initial agent config
  become: true
  ansible.builtin.template:
    src: rke2-agent-config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'
  no_log: true
  notify: Restart rke2-agent

- name: Ensure rke2-agent.service is started
  ansible.builtin.systemd:
    name: rke2-agent.service
    state: started
    enabled: true

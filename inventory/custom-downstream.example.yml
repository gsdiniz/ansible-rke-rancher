---
all:
  children:
    downstream_custom:
      vars:
        rancher_cluster_name: downstream-custom-dev
        rancher_registration_token_name: default-token
        rancher_kubeconfig: rancher.kubeconfig
      hosts:
        custom-master-1:
          ansible_host: "10.0.10.11"
          ansible_user: "ansible"
          rancher_role_etcd: true
          rancher_role_controlplane: true
          rancher_role_worker: true
        custom-worker-1:
          ansible_host: "10.0.10.21"
          ansible_user: "ansible"
          rancher_role_etcd: false
          rancher_role_controlplane: false
          rancher_role_worker: true


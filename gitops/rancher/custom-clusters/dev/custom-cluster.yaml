---
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: downstream-custom-dev
  namespace: fleet-default
  labels:
    app.kubernetes.io/managed-by: gitops
    rancher.cattle.io/downstream-env: dev
    rancher.cattle.io/downstream-type: custom
spec:
  displayName: downstream-custom-dev
  localClusterAuthEndpoint: {}
  rkeConfig:
    chartValues:
      rke2-calico: {}
    machineGlobalConfig:
      cni: calico
      cluster-cidr: 10.42.0.0/16
      service-cidr: 10.43.0.0/16
      cluster-dns: 10.43.0.10
      disable-kube-proxy: false
      etcd-expose-metrics: true
      profile: null
      selinux: true

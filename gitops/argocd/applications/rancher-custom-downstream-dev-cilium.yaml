---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher-custom-downstream-dev-cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ssh://git@github.com/CHANGE_ME/ansible-rke-rancher.git
    targetRevision: HEAD
    path: gitops/rancher/custom-clusters/dev-cilium
  destination:
    server: https://kubernetes.default.svc
    namespace: fleet-default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
